<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>College Website Navbar</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#f4f4f4;
}

/* Navbar */
nav{
    background:#003366;
    padding:15px 40px;

    display:flex;
    justify-content:space-between;
    align-items:center;
}

.logo{
    color:white;
    font-size:28px;
    font-weight:bold;
}

.nav-links{
    display:flex;
    list-style:none;
    gap:25px;
}

.nav-links a{
    color:white;
    text-decoration:none;
    font-size:18px;
    padding:8px 12px;
    border-radius:5px;
    transition:0.3s;
}

/* Hover Effect */
.nav-links a:hover{
    background:white;
    color:#003366;
}

/* Mobile Responsive */
@media(max-width:768px){

    nav{
        flex-direction:column;
    }

    .nav-links{
        flex-direction:column;
        text-align:center;
        margin-top:15px;
        gap:10px;
    }
}

</style>
</head>

<body>

<nav>

    <div class="logo">
        My College
    </div>

    <ul class="nav-links">

        <li><a href="#">Home</a></li>

        <li><a href="#">Courses</a></li>

        <li><a href="#">Faculty</a></li>

        <li><a href="#">Placements</a></li>

        <li><a href="#">Contact</a></li>

    </ul>

</nav>

</body>
</html>
