<!DOCTYPE html>

        boby{

            background-color:aqua;
            margin:20px;
        }
        h1{
            text-align: center;
            color: black;
        }
        button{
            background-color: red;
            color:black;
            border: none;
            padding:10px 20px;
            margin:15px;
            border-radius: 5xp;
            cursor: pointer;
        }
        button:hover{
            background-color:green;
        }
        .container{
            display:flex;
            flex-werp: wrap;
            gap:20px;
            justify-content: center;
        }
         .card{
            width: 250px;
            background: white;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
            text-align: center;
            transition: transform 0.3s;
         }
          .card:hover{
            transform: scale(1.05);
        }
         .card img{
            width: 100%;
            height: 200px;
            object-fit: cover;
        }
          .card h3{
            margin: 10px 0;
            color: #333;
        }

        .price{
            color: green;
            font-size: 20px;
            font-weight: bold;
        }
    </style>
</head>
