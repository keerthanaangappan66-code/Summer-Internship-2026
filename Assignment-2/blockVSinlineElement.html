<!DOCTYPE html>
<head>
    <title>BLOCK VS INLINE ELEMENT</title>
    <style>
        div {
            background-color: lightpink;
            border: 1px solid black;
            margin: 5px;
            padding: 10px;
        }
         span {
            background-color: lightgoldenrodyellow;
            border: 1px solid black;
            padding: 5px;
        }
    </style>
</head>
 <body>
    <h2>Block Elements (div)</h2>

    <div>I love Money</div>
    <div>I love to  be Indepandent</div>
    <div>My Dream to go aboard</div>

    <h2>Inline Elements (span)</h2>

    <span>Hello</span>
    <span>Hey</span>
    <span>Hi</span>

 </body>
 </html>
